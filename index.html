<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電子計分板 (整合版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100vh; 
            padding: 20px; 
            overflow: hidden; 
            transition: padding 0.3s;
        }

        /* 頂部區域 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .icon-btn { width: 50px; height: 50px; background-color: #fff; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; border: none; }
        .inning-control { display: flex; align-items: center; gap: 15px; font-size: 28px; font-weight: bold; }
        .arrows { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .arrow-up { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 18px solid #ff3b30; }
        .arrow-down { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 18px solid #ff3b30; }
        .digital-yellow { font-family: monospace; color: #e6e600; font-size: 45px; text-shadow: 0 0 10px rgba(230,230,0,0.5); }
        .btn-plus-sm { width: 35px; height: 35px; background-color: #fff; color: #000; border-radius: 50%; font-size: 22px; font-weight: bold; border: none; cursor: pointer; }

        /* 中部區域：隊伍與分數 */
        .main-scoreboard { display: flex; justify-content: space-around; align-items: center; width: 100%; flex-grow: 1; }
        .team-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .team-name { font-size: 28px; font-weight: bold; transition: font-size 0.3s; }
        .score-container { display: flex; align-items: center; gap: 20px; }
        .btn-plus-lg { width: 55px; height: 55px; background-color: #fff; color: #000; border-radius: 50%; font-size: 32px; font-weight: bold; border: none; cursor: pointer; }
        .digital-score { font-family: monospace; font-size: 110px; color: #00ff00; text-shadow: 0 0 20px rgba(0,255,0,0.5); min-width: 80px; text-align: center; cursor: pointer; transition: font-size 0.3s; }
        .vs-sign { font-size: 45px; transition: font-size 0.3s; }

        /* 底部區域：壘包與計數 */
        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; padding-bottom: 20px; }
        .bases-container { position: relative; width: 120px; height: 120px; transition: transform 0.3s; }
        .base { position: absolute; width: 32px; height: 32px; border: 2px solid #fff; transform: rotate(45deg); cursor: pointer; transition: background-color 0.2s; }
        .base.active { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .base-1 { top: 40px; right: 10px; }
        .base-2 { top: 5px; left: 44px; }
        .base-3 { top: 40px; left: 10px; }
        .counters { display: flex; gap: 40px; align-items: center; }
        .counter-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .counter-label { font-size: 22px; font-weight: bold; transition: font-size 0.3s; }
        .counter-control { display: flex; align-items: center; gap: 10px; }
        .digital-yellow-sm { font-family: monospace; color: #e6e600; font-size: 38px; text-shadow: 0 0 10px rgba(230,230,0,0.5); min-width: 30px; text-align: center; transition: font-size 0.3s; }

        /* -------------------------------------------
           顯示端專用樣式 (當網址有 ?mode=display 時激活)
           ------------------------------------------- */
        body.mode-display { padding: 40px; }
        body.mode-display .ctrl-btn { display: none !important; } /* 隱藏所有控制按鈕 */
        body.mode-display .top-bar { justify-content: center; }
        body.mode-display .arrows { cursor: default; }
        body.mode-display .digital-score { pointer-events: none; }
        body.mode-display .base { cursor: default; }
        
        /* 顯示端放大字體與佈局 */
        body.mode-display .digital-yellow { font-size: 60px; }
        body.mode-display .team-name { font-size: 40px; }
        body.mode-display .digital-score { font-size: 160px; }
        body.mode-display .vs-sign { font-size: 60px; }
        body.mode-display .counter-label { font-size: 30px; }
        body.mode-display .digital-yellow-sm { font-size: 50px; }
        body.mode-display .bases-container { transform: scale(1.25); transform-origin: left bottom; }
        body.mode-display .bottom-bar { padding-bottom: 40px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="ctrl-btn" style="width:110px;"></div> <div class="inning-control">
            <div class="arrows" id="arrows-click" onclick="toggleHalfInning()">
                <div class="arrow-up" id="arrow-top"></div>
                <div class="arrow-down" id="arrow-bottom"></div>
            </div>
            <span>局</span>
            <span class="digital-yellow" id="inning-num">1</span>
            <button class="btn-plus-sm ctrl-btn" onclick="changeInning(1)">+</button>
        </div>

        <div class="right-icons ctrl-btn">
            <button class="icon-btn" onclick="resetBoard()">🔄</button>
        </div>
    </div>

    <div class="main-scoreboard">
        <div class="team-box">
            <div class="team-name">團隊 1</div>
            <div class="score-container">
                <button class="btn-plus-lg ctrl-btn" onclick="changeScore('team1', 1)">+</button>
                <div class="digital-score" id="score-team1" onclick="changeScore('team1', -1)">0</div>
            </div>
        </div>

        <div class="vs-sign">X</div>

        <div class="team-box">
            <div class="team-name">團隊 2</div>
            <div class="score-container">
                <div class="digital-score" id="score-team2" onclick="changeScore('team2', -1)">0</div>
                <button class="btn-plus-lg ctrl-btn" onclick="changeScore('team2', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bases-container">
            <div class="base base-1" id="base1" onclick="toggleBase(1)"></div>
            <div class="base base-2" id="base2" onclick="toggleBase(2)"></div>
            <div class="base base-3" id="base3" onclick="toggleBase(3)"></div>
        </div>

        <div class="counters">
            <div class="counter-group">
                <div class="counter-label">球 / 擊球</div>
                <div class="counter-control">
                    <button class="btn-plus-sm ctrl-btn" onclick="changeBall(1)">+</button>
                    <span class="digital-yellow-sm" id="ball-count">0</span>
                    <span style="color:#e6e600; font-size:24px;">-</span>
                    <span class="digital-yellow-sm" id="strike-count">0</span>
                    <button class="btn-plus-sm ctrl-btn" onclick="changeStrike(1)">+</button>
                </div>
            </div>

            <div class="counter-group">
                <div class="counter-label">出局</div>
                <div class="counter-control">
                    <span class="digital-yellow-sm" id="out-count">0</span>
                    <button class="btn-plus-sm ctrl-btn" onclick="changeOut(1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 請把下方網址替換成你在 Firebase 複製的資料庫網址 ⚠️
        const FIREBASE_URL = "https://你的專案名稱-rtdb.firebaseio.com/";

        // 解析網址參數，檢查是不是顯示端
        const urlParams = new URLSearchParams(window.location.search);
        const isDisplayMode = urlParams.get('mode') === 'display';

        let state = {
            inning: 1, isTopInning: true,
            scoreTeam1: 0, scoreTeam2: 0,
            balls: 0, strikes: 0, outs: 0,
            bases: [false, false, false]
        };

        // 初始化設定
        if (isDisplayMode) {
            document.body.classList.add('mode-display');
            document.getElementById('arrows-click').onclick = null; // 關閉顯示端點擊
            // 顯示端：每秒向雲端拿最新資料
            setInterval(fetchFromCloud, 1000);
            fetchFromCloud();
        } else {
            // 控制端：初始化本地畫面
            updateDisplay(true); 
        }

        // [控制端用] 上傳到雲端
        async function saveToCloud() {
            try {
                await fetch(`${FIREBASE_URL}/scoreboard.json`, {
                    method: 'PUT',
                    body: JSON.stringify(state)
                });
            } catch (error) {
                console.error("雲端同步失敗:", error);
            }
        }

        // [顯示端用] 從雲端抓取
        async function fetchFromCloud() {
            try {
                const response = await fetch(`${FIREBASE_URL}/scoreboard.json`);
                const data = await response.json();
                if (data) {
                    state = data;
                    updateDisplay(false); // 更新畫面，但不重複觸發上傳
                }
            } catch (error) {
                console.error("讀取雲端失敗:", error);
            }
        }

        // 更新畫面顯示
        function updateDisplay(shouldUpload = true) {
            document.getElementById('inning-num').innerText = state.inning;
            document.getElementById('score-team1').innerText = state.scoreTeam1;
            document.getElementById('score-team2').innerText = state.scoreTeam2;
            document.getElementById('ball-count').innerText = state.balls;
            document.getElementById('strike-count').innerText = state.strikes;
            document.getElementById('out-count').innerText = state.outs;

            document.getElementById('arrow-top').style.opacity = state.isTopInning ? '1' : '0.3';
            document.getElementById('arrow-bottom').style.opacity = state.isTopInning ? '0.3' : '1';

            document.getElementById('base1').classList.toggle('active', state.bases[0]);
            document.getElementById('base2').classList.toggle('active', state.bases[1]);
            document.getElementById('base3').classList.toggle('active', state.bases[2]);
            
            // 只有控制端操作時才同步到雲端
            if (!isDisplayMode && shouldUpload) {
                saveToCloud();
            }
        }

        // 互動邏輯（控制端專用，顯示端已被樣式阻擋點擊）
        function changeScore(team, val) {
            if (team === 'team1') state.scoreTeam1 = Math.max(0, state.scoreTeam1 + val);
            else state.scoreTeam2 = Math.max(0, state.scoreTeam2 + val);
            updateDisplay();
        }
        function changeInning(val) { state.inning = Math.max(1, state.inning + val); updateDisplay(); }
        function toggleHalfInning() { state.isTopInning = !state.isTopInning; updateDisplay(); }
        function changeBall(val) {
            state.balls += val;
            if (state.balls >= 4) { state.balls = 0; state.strikes = 0; }
            updateDisplay();
        }
        function changeStrike(val) {
            state.strikes += val;
            if (state.strikes >= 3) { state.strikes = 0; state.balls = 0; changeOut(1); }
            updateDisplay();
        }
        function changeOut(val) {
            state.outs += val;
            if (state.outs >= 3) { state.outs = 0; state.balls = 0; state.strikes = 0; state.bases = [false, false, false]; }
            updateDisplay();
        }
        function toggleBase(baseNum) { state.bases[baseNum - 1] = !state.bases[baseNum - 1]; updateDisplay(); }
        function resetBoard() {
            if (confirm("確定要重設所有數據嗎？")) {
                state = { inning: 1, isTopInning: true, scoreTeam1: 0, scoreTeam2: 0, balls: 0, strikes: 0, outs: 0, bases: [false, false, false] };
                updateDisplay();
            }
        }
    </script>
</body>
</html>
