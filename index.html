<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>棒球電子計分版</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
        }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100vh; 
            width: 100vw;  
            padding: 1vh 2vw; /* 縮減整體上下外邊距 */
            overflow: hidden; 
        }

        /* 頂部區域 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; height: 7vh; }
        .icon-btn { width: 6vh; height: 6vh; max-width: 40px; max-height: 40px; background-color: #fff; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.2vh; cursor: pointer; border: none; }
        .inning-control { display: flex; align-items: center; gap: 12px; font-size: 3vh; font-weight: bold; }
        .arrows { display: flex; flex-direction: column; gap: 3px; cursor: pointer; }
        .arrow-up { width: 0; height: 0; border-left: 0.8vh solid transparent; border-right: 0.8vh solid transparent; border-bottom: 1.2vh solid #ff3b30; }
        .arrow-down { width: 0; height: 0; border-left: 0.8vh solid transparent; border-right: 0.8vh solid transparent; border-top: 1.2vh solid #ff3b30; }
        .digital-yellow { font-family: monospace; color: #e6e600; font-size: 4.5vh; text-shadow: 0 0 10px rgba(230,230,0,0.5); cursor: pointer; }
        .btn-plus-sm { width: 4.5vh; height: 4.5vh; max-width: 32px; max-height: 32px; background-color: #fff; color: #000; border-radius: 50%; font-size: 2.5vh; font-weight: bold; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* 中部區域：縮緊緊湊型高度，專治平板溢出 */
        .main-scoreboard { display: flex; justify-content: space-between; align-items: center; width: 100%; height: 48vh; flex-grow: 1; margin: 5px 0; }
        .team-box { display: flex; flex-direction: column; align-items: center; gap: 1vh; width: 28%; }
        
        .team-input {
            background: #111; color: #fff; border: 1px solid #444; border-radius: 6px;
            font-size: 2.5vh; font-weight: bold; text-align: center; width: 90%; padding: 3px; user-select: text; -webkit-user-select: text;
        }
        .team-input:focus { border-color: #00ff00; outline: none; background: #222; }
        .score-container { display: flex; align-items: center; gap: 1vw; }
        .btn-plus-lg { width: 7vh; height: 7vh; max-width: 50px; max-height: 50px; background-color: #fff; color: #000; border-radius: 50%; font-size: 3.5vh; font-weight: bold; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .digital-score { font-family: monospace; font-size: 13vh; color: #00ff00; text-shadow: 0 0 20px rgba(0,255,0,0.5); min-width: 9vh; text-align: center; cursor: pointer; }

        /* 中央綜合面板 */
        .center-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1vh; width: 44%; height: 100%; }
        .radar-box { display: flex; align-items: center; gap: 6px; justify-content: center; width: 100%; }
        .radar-display { font-family: monospace; font-size: 4vh; color: #ff9500; text-shadow: 0 0 10px rgba(255,149,0,0.5); font-weight: bold; }
        .radar-btn { padding: 5px 10px; font-size: 1.6vh; font-weight: bold; background-color: #333; color: #fff; border: 1px solid #555; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .radar-btn.timing { background-color: #ff3b30; border-color: #ff8883; animation: blink 0.8s infinite alternate; }

        /* Kzone 自適應小型化 */
        .kzone-container {
            position: relative;
            width: 100%;
            max-width: 22vh; /* 高度反推，嚴格限縮最大尺寸防止撐開 */
            height: 26vh;
            background-color: rgba(255,255,255,0.02);
            border: 1px dashed #333;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        /* Kzone 核心九宮格 */
        .kzone-grid {
            width: 65%;
            height: 68%;
            border: 2px solid #aaa;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            background-color: rgba(255,255,255,0.06);
            pointer-events: none;
        }
        .kzone-line { border: 1px solid rgba(255,255,255,0.25); }

        /* 投球落點圓點 */
        .pitch-dot {
            position: absolute;
            width: 2.8vh;
            height: 2.8vh;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5vh;
            font-weight: bold;
            color: #fff;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px rgba(0,0,0,0.8), inset 0 0 3px #fff;
            pointer-events: none;
            z-index: 10;
        }
        .pitch-dot.strike-pitch { background-color: #ff3b30; border: 1px solid #ff8883; }
        .pitch-dot.ball-pitch { background-color: #4cd964; border: 1px solid #85f096; }

        /* 底部區域：限縮高度 */
        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; height: 18vh; padding-bottom: 0.5vh; }
        .bases-container { position: relative; width: 13vh; height: 13vh; }
        .base { position: absolute; width: 3.5vh; height: 3.5vh; border: 2px solid #fff; transform: rotate(45deg); cursor: pointer; transition: background-color 0.2s; }
        .base.active { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .base-1 { top: 35%; right: 10%; }
        .base-2 { top: 10%; left: 35%; }
        .base-3 { top: 35%; left: 10%; }

        /* BSO 面板 */
        .bso-panel { display: flex; flex-direction: column; gap: 0.6vh; background-color: #111; padding: 1vh 1.5vh; border-radius: 8px; border: 1px solid #333; }
        .bso-row { display: flex; align-items: center; gap: 12px; }
        .bso-label { width: 3.5vh; height: 3.5vh; background-color: #333; color: #bbb; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 2vh; font-weight: bold; }
        body:not(.mode-display) .bso-label { cursor: pointer; }
        .bso-dots { display: flex; gap: 6px; }
        body:not(.mode-display) .bso-dots { cursor: pointer; }
        .dot { width: 2.6vh; height: 2.6vh; border-radius: 50%; background-color: #222; border: 2px solid #444; box-shadow: inset 0 0 5px #000; }
        .dot.ball-active { background-color: #00ff00; border-color: #88ff88; box-shadow: 0 0 10px #00ff00; }
        .dot.strike-active { background-color: #ffcc00; border-color: #ffea88; box-shadow: 0 0 10px #ffcc00; }
        .dot.out-active { background-color: #ff3b30; border-color: #ff8883; box-shadow: 0 0 10px #ff3b30; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        /* -------------------------------------------
           顯示端唯讀與放大佈局
           ------------------------------------------- */
        body.mode-display .ctrl-btn { display: none !important; }
        body.mode-display .top-bar { justify-content: center; }
        body.mode-display .arrows, body.mode-display .digital-score, body.mode-display .base, body.mode-display .kzone-container, body.mode-display .digital-yellow { pointer-events: none; cursor: default; }
        
        body.mode-display .team-input { background: transparent; border: none; pointer-events: none; font-size: 5vh; width: auto; padding: 0; }
        body.mode-display .digital-yellow { font-size: 7vh; }
        body.mode-display .digital-score { font-size: 20vh; }
        
        body.mode-display .center-panel { gap: 4vh; justify-content: center; } 
        body.mode-display .radar-box { margin-bottom: 10px; }
        body.mode-display .kzone-container { transform: scale(1.3); }
        
        body.mode-display .radar-display { font-size: 6vh; }
        body.mode-display .bases-container { transform: scale(1.4); transform-origin: left bottom; }
        body.mode-display .bso-panel { transform: scale(1.4); transform-origin: right bottom; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="icon-btn ctrl-btn" title="清除數據（保留隊名）" onclick="resetBoard()">🔄</button>
        
        <div class="inning-control">
            <div class="arrows" id="arrows-click" onclick="toggleHalfInning()">
                <div class="arrow-up" id="arrow-top"></div>
                <div class="arrow-down" id="arrow-bottom"></div>
            </div>
            <span>局</span>
            <span class="digital-yellow" id="inning-num" onclick="changeInning(-1)">1</span>
            <button class="btn-plus-sm ctrl-btn" onclick="changeInning(1)">+</button>
        </div>
        <div class="ctrl-btn" style="width:45px;"></div>
    </div>

    <div class="main-scoreboard">
        <div class="team-box">
            <input type="text" class="team-input" id="team1-name" value="團隊 1" onchange="updateTeamName()">
            <div class="score-container">
                <button class="btn-plus-lg ctrl-btn" onclick="changeScore('team1', 1)">+</button>
                <div class="digital-score" id="score-team1" onclick="changeScore('team1', -1)">0</div>
            </div>
        </div>

        <div class="center-panel">
            <div class="radar-box">
                <div class="radar-display"><span id="speed-num">---</span> <span style="font-size: 1.8vh;">km/h</span></div>
                <button class="radar-btn ctrl-btn" id="radar-trigger" onclick="triggerRadar()">測速</button>
                <button class="radar-btn ctrl-btn" style="background-color: #970000; border-color: #ff5555;" onclick="popPitch()">減 1</button>
                <button class="radar-btn ctrl-btn" style="background-color: #222; border-color: #444;" onclick="clearPitches()">清除</button>
            </div>
            
            <div class="kzone-container" id="kzone-click-area" onclick="handleKzoneClick(event)">
                <div class="kzone-grid" id="strike-zone-box">
                    <div class="kzone-line"></div><div class="kzone-line"></div><div class="kzone-line"></div>
                    <div class="kzone-line"></div><div class="kzone-line"></div><div class="kzone-line"></div>
                    <div class="kzone-line"></div><div class="kzone-line"></div><div class="kzone-line"></div>
                </div>
            </div>
        </div>

        <div class="team-box">
            <input type="text" class="team-input" id="team2-name" value="團隊 2" onchange="updateTeamName()">
            <div class="score-container">
                <div class="digital-score" id="score-team2" onclick="changeScore('team2', -1)">0</div>
                <button class="btn-plus-lg ctrl-btn" onclick="changeScore('team2', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bases-container">
            <div class="base base-1" id="base1" onclick="toggleBase(1)"></div>
            <div class="base base-2" id="base2" onclick="toggleBase(2)"></div>
            <div class="base base-3" id="base3" onclick="toggleBase(3)"></div>
        </div>

        <div class="bso-panel">
            <div class="bso-row">
                <div class="bso-label" onclick="changeBall(-1)">B</div>
                <div class="bso-dots" onclick="changeBall(1)">
                    <div class="dot" id="b-dot-1"></div>
                    <div class="dot" id="b-dot-2"></div>
                    <div class="dot" id="b-dot-3"></div>
                </div>
            </div>
            <div class="bso-row">
                <div class="bso-label" onclick="changeStrike(-1)">S</div>
                <div class="bso-dots" onclick="changeStrike(1)">
                    <div class="dot" id="s-dot-1"></div>
                    <div class="dot" id="s-dot-2"></div>
                </div>
            </div>
            <div class="bso-row">
                <div class="bso-label" onclick="changeOut(-1)">O</div>
                <div class="bso-dots" onclick="changeOut(1)">
                    <div class="dot" id="o-dot-1"></div>
                    <div class="dot" id="o-dot-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://baseball-score-576dc-default-rtdb.asia-southeast1.firebasedatabase.app/";

        const urlParams = new URLSearchParams(window.location.search);
        const isDisplayMode = urlParams.get('mode') === 'display';

        const DEFAULT_STATE = {
            inning: 1, isTopInning: true,
            scoreTeam1: 0, scoreTeam2: 0,
            team1Name: "團隊 1", team2Name: "團隊 2",
            balls: 0, strikes: 0, outs: 0,
            bases: [false, false, false],
            pitches: [],
            currentSpeed: "---"
        };

        let state = { ...DEFAULT_STATE };
        let startTime = null;
        let isTiming = false;
        let lastTouchEnd = 0;

        // 🚀 修正防雙擊放大核心：允許測速按鈕連點不受限制
        document.addEventListener('touchend', function (event) {
            // 💡 白名單檢查：如果是測速按鈕，放行不阻斷
            if (event.target && event.target.id === 'radar-trigger') {
                return; 
            }
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault(); 
            }
            lastTouchEnd = now;
        }, false);

        if (isDisplayMode) {
            document.title = "棒球電子計分版（顯示）";
            document.body.classList.add('mode-display');
            document.getElementById('arrows-click').onclick = null;
            setInterval(fetchFromCloud, 1000);
            fetchFromCloud();
        } else {
            document.title = "棒球電子計分版（控制）";
            const localSaved = localStorage.getItem('baseball_scoreboard_state');
            if (localSaved) {
                try { state = JSON.parse(localSaved); } catch(e) { state = { ...DEFAULT_STATE }; }
            }
            updateDisplay(true); 
        }

        async function saveToCloud() {
            localStorage.setItem('baseball_scoreboard_state', JSON.stringify(state));
            fetch(`${FIREBASE_URL}/scoreboard.json`, {
                method: 'PUT',
                body: JSON.stringify(state)
            }).catch(err => console.error("雲端同步背景失敗:", err));
        }

        async function fetchFromCloud() {
            try {
                const response = await fetch(`${FIREBASE_URL}/scoreboard.json`);
                const data = await response.json();
                if (data) {
                    state = {
                        inning: data.inning ?? 1, isTopInning: data.isTopInning ?? true,
                        scoreTeam1: data.scoreTeam1 ?? 0, scoreTeam2: data.scoreTeam2 ?? 0,
                        team1Name: data.team1Name ?? "團隊 1", team2Name: data.team2Name ?? "團隊 2",
                        balls: data.balls ?? 0, strikes: data.strikes ?? 0, outs: data.outs ?? 0,
                        bases: data.bases ?? [false, false, false], pitches: data.pitches ?? [],
                        currentSpeed: data.currentSpeed ?? "---"
                    };
                }
                updateDisplay(false); 
            } catch (error) {
                console.error("讀取雲端失敗:", error);
            }
        }

        function updateDisplay(shouldUpload = true) {
            document.getElementById('inning-num').innerText = state.inning;
            document.getElementById('score-team1').innerText = state.scoreTeam1;
            document.getElementById('score-team2').innerText = state.scoreTeam2;
            document.getElementById('team1-name').value = state.team1Name;
            document.getElementById('team2-name').value = state.team2Name;

            document.getElementById('arrow-top').style.opacity = state.isTopInning ? '1' : '0.3';
            document.getElementById('arrow-bottom').style.opacity = state.isTopInning ? '0.3' : '1';

            document.getElementById('base1').classList.toggle('active', state.bases[0]);
            document.getElementById('base2').classList.toggle('active', state.bases[1]);
            document.getElementById('base3').classList.toggle('active', state.bases[2]);
            
            document.getElementById('b-dot-1').classList.toggle('ball-active', state.balls >= 1);
            document.getElementById('b-dot-2').classList.toggle('ball-active', state.balls >= 2);
            document.getElementById('b-dot-3').classList.toggle('ball-active', state.balls >= 3);
            document.getElementById('s-dot-1').classList.toggle('strike-active', state.strikes >= 1);
            document.getElementById('s-dot-2').classList.toggle('strike-active', state.strikes >= 2);
            document.getElementById('o-dot-1').classList.toggle('out-active', state.outs >= 1);
            document.getElementById('o-dot-2').classList.toggle('out-active', state.outs >= 2);
            
            document.getElementById('speed-num').innerText = state.currentSpeed;

            renderPitchDots();
            if (!isDisplayMode && shouldUpload) { saveToCloud(); }
        }

        function handleKzoneClick(event) {
            if (isDisplayMode) return;
            const container = document.getElementById('kzone-click-area');
            const grid = document.getElementById('strike-zone-box');
            const rect = container.getBoundingClientRect();
            const gridRect = grid.getBoundingClientRect();

            const clickX = ((event.clientX - rect.left) / rect.width) * 100;
            const clickY = ((event.clientY - rect.top) / rect.height) * 100;

            const isStrike = (
                event.clientX >= gridRect.left && event.clientX <= gridRect.right &&
                event.clientY >= gridRect.top && event.clientY <= gridRect.bottom
            );

            state.pitches.push({ x: clickX, y: clickY, isStrike: isStrike });
            updateDisplay();
        }

        function renderPitchDots() {
            const container = document.getElementById('kzone-click-area');
            const existingDots = container.querySelectorAll('.pitch-dot');
            existingDots.forEach(dot => dot.remove());

            state.pitches.forEach((pitch, index) => {
                const dot = document.createElement('div');
                dot.className = `pitch-dot ${pitch.isStrike ? 'strike-pitch' : 'ball-pitch'}`;
                dot.style.left = `${pitch.x}%`;
                dot.style.top = `${pitch.y}%`;
                dot.innerText = index + 1;
                container.appendChild(dot);
            });
        }

        function popPitch() {
            if (isDisplayMode || state.pitches.length === 0) return;
            state.pitches.pop(); 
            updateDisplay();
        }

        document.getElementById('radar-trigger').addEventListener('touchstart', function(e) {
            // 行動端直接在 touchstart 觸發，澈底根絕點擊延遲
            e.preventDefault();
            triggerRadar();
        });

        function clearPitches() {
            if (isDisplayMode) return;
            state.pitches = [];
            updateDisplay();
        }

        function updateTeamName() {
            if (isDisplayMode) return;
            state.team1Name = document.getElementById('team1-name').value;
            state.team2Name = document.getElementById('team2-name').value;
            saveToCloud();
        }

        function triggerRadar() {
            if (isDisplayMode) return;
            const btn = document.getElementById('radar-trigger');
            if (!isTiming) {
                startTime = performance.now();
                isTiming = true;
                btn.innerText = "出手中";
                btn.classList.add('timing');
            } else {
                const endTime = performance.now();
                const durationSeconds = (endTime - startTime) / 1000;
                isTiming = false;
                btn.innerText = "測速";
                btn.classList.remove('timing');

                if (durationSeconds > 0.02) {
                    const kmh = (4.5 / durationSeconds) * 3.6;
                    state.currentSpeed = Math.round(kmh).toString();
                } else {
                    state.currentSpeed = "---";
                }
                updateDisplay();
            }
        }

        function changeScore(team, val) {
            if (team === 'team1') state.scoreTeam1 = Math.max(0, state.scoreTeam1 + val);
            else state.scoreTeam2 = Math.max(0, state.scoreTeam2 + val);
            updateDisplay();
        }
        function changeInning(val) { 
            if (isDisplayMode) return;
            state.inning = Math.max(1, state.inning + val); 
            updateDisplay(); 
        }
        function toggleHalfInning() { state.isTopInning = !state.isTopInning; updateDisplay(); }
        function changeBall(val) {
            if (isDisplayMode) return;
            state.balls = Math.max(0, state.balls + val);
            if (state.balls >= 4) { state.balls = 0; state.strikes = 0; }
            updateDisplay();
        }
        function changeStrike(val) {
            if (isDisplayMode) return;
            state.strikes = Math.max(0, state.strikes + val);
            if (state.strikes >= 3) { state.strikes = 0; state.balls = 0; changeOut(1); }
            updateDisplay();
        }
        function changeOut(val) {
            if (isDisplayMode) return;
            state.outs = Math.max(0, state.outs + val);
            if (state.outs >= 3) { 
                state.outs = 0; state.balls = 0; state.strikes = 0; 
                state.bases = [false, false, false]; state.pitches = [];
            }
            updateDisplay();
        }
        function toggleBase(baseNum) { 
            if (isDisplayMode) return;
            state.bases[baseNum - 1] = !state.bases[baseNum - 1]; 
            updateDisplay(); 
        }

        function resetBoard() {
            if (confirm("【⚠️ 清除數據警告】確定要清空得分與球數嗎？（隊伍名稱將保留）")) {
                const currentTeam1 = state.team1Name;
                const currentTeam2 = state.team2Name;
                state = { ...DEFAULT_STATE };
                state.team1Name = currentTeam1;
                state.team2Name = currentTeam2;
                updateDisplay(true);
            }
        }
    </script>
</body>
</html>
